name = "yaya-msg-web"
main = "workers/yaya-web.js"
compatibility_date = "2026-04-30"
workers_dev = true

[assets]
directory = "./web-dist"
binding = "ASSETS"
run_worker_first = true

[[routes]]
pattern = "gnz.hk"
custom_domain = true

[[r2_buckets]]
binding = "YAYA_DOWNLOADS"
bucket_name = "yaya-downloads"
