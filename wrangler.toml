name = "yaya-msg-web"
main = "workers/yaya-web.js"
compatibility_date = "2026-04-30"
workers_dev = true

[assets]
directory = "./web-dist"
binding = "ASSETS"
run_worker_first = [
    "/",
    "/index.html",
    "/api/*",
    "/web-media-proxy",
    "/report",
    "/report/*",
    "/downloads",
    "/downloads/*",
    "/home",
    "/home/*",
    "/messages",
    "/messages/*",
    "/fetch",
    "/fetch/*",
    "/live",
    "/live/*",
    "/vod",
    "/vod/*",
    "/meet48-live",
    "/meet48-live/*",
    "/meet48-vod",
    "/meet48-vod/*",
    "/replay",
    "/replay/*",
    "/room",
    "/room/*",
    "/followed-rooms",
    "/followed-rooms/*",
    "/message",
    "/message/*",
    "/48qu",
    "/48qu/*",
    "/community",
    "/community/*",
    "/pbc",
    "/pbc/*",
    "/img",
    "/img/*",
    "/dynamic",
    "/dynamic/*",
    "/weibo",
    "/weibo/*",
    "/openlive",
    "/openlive/*",
    "/send-flip",
    "/send-flip/*",
    "/flip",
    "/flip/*",
    "/nft",
    "/nft/*",
    "/video",
    "/video/*",
    "/music",
    "/music/*",
    "/official-site-music",
    "/official-site-music/*",
    "/audio",
    "/audio/*",
    "/profile",
    "/profile/*",
    "/database",
    "/database/*",
    "/invoice",
    "/invoice/*",
    "/melee",
    "/melee/*",
    "/trip",
    "/trip/*",
    "/login",
    "/login/*",
    "/settings",
    "/settings/*",
    "/voice",
    "/voice/*",
    "/r2-music",
    "/r2-music/*"
]

[[routes]]
pattern = "gnz.hk"
custom_domain = true

[[r2_buckets]]
binding = "YAYA_DOWNLOADS"
bucket_name = "yaya-downloads"
